<!doctype html>
<html lang="en" translate="no" class="notranslate">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Leaderboard</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; max-width: 760px; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border: 1px solid #ddd; padding: 8px; }
      th { background: #f4f4f4; }
      .lang-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    </style>
  </head>
  <body>
    <div class="lang-row">
      <label for="langSelect" data-i18n="common.language">Language</label>
      <select id="langSelect"></select>
    </div>
    <h1 data-i18n="leaderboard.header">Leaderboard</h1>
    <table>
      <thead>
        <tr><th data-i18n="leaderboard.rank">#</th><th data-i18n="leaderboard.team">Team</th><th data-i18n="leaderboard.score">Score</th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/i18n.js"></script>
    <script src="/leaderboard.js"></script>
  </body>
  </html>
