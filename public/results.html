<!doctype html>
<html lang="en" translate="no" class="notranslate">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Quiz Results</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; max-width: 840px; }
      .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 16px; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border: 1px solid #ddd; padding: 8px; }
      th { background: #f5f5f5; }
      .muted { color: #666; }
      .highlight { background: #eef6ff; }
      .lang-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    </style>
  </head>
  <body>
    <div class="lang-row">
      <label for="langSelect" data-i18n="common.language">Language</label>
      <select id="langSelect"></select>
    </div>
    <h1 data-i18n="results.header">Final Results</h1>

    <div class="card">
      <div><strong data-i18n="results.team">Team:</strong> <span id="teamName">-</span></div>
      <div><strong data-i18n="results.score">Score:</strong> <span id="teamScore">0</span></div>
      <div><strong data-i18n="results.placement">Placement:</strong> <span id="teamPlacement">-</span></div>
      <div id="status" class="muted"></div>
    </div>

    <div class="card">
      <h3 data-i18n="results.leaderboard">Leaderboard</h3>
      <table>
        <thead>
          <tr><th data-i18n="leaderboard.rank">#</th><th data-i18n="leaderboard.team">Team</th><th data-i18n="leaderboard.score">Score</th></tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>

    <script src="/i18n.js"></script>
    <script src="/results.js"></script>
  </body>
</html>
