<!doctype html>
<html lang="en" translate="no" class="notranslate">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Quiz Admin</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
      button { padding: 8px 12px; }
      table { border-collapse: collapse; width: 100%; margin-top: 10px; }
      th, td { border: 1px solid #ddd; padding: 8px; font-size: 14px; }
      th { background: #f4f4f4; }
      .section { margin-top: 20px; }
      .muted { color: #555; font-size: 14px; }
      .notice { color: #0b6b2f; font-weight: 600; margin-top: 6px; }
      .attention-btn { background: #fff3cd; border: 1px solid #f0ad4e; font-weight: 700; }
      input[type="text"] { padding: 6px; width: 220px; }
      .answer-cell { display: flex; align-items: center; gap: 6px; }
      .answer-cell input { flex: 1; min-width: 160px; width: auto; }
      .save-icon-btn { padding: 4px 8px; font-size: 12px; line-height: 1; }
      .lang-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
      tr.team-away-row { background: #fff4e6; }
      td.team-away-cell { color: #b45309; font-weight: 600; }
      .modal { display: none; position: fixed; inset: 0; z-index: 1000; align-items: center; justify-content: center; padding: 16px; }
      .modal.open { display: flex; }
      .modal-backdrop { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.45); }
      .modal-dialog { position: relative; background: #fff; border-radius: 10px; padding: 20px; max-width: 420px; width: 100%; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2); }
      .modal-close { position: absolute; top: 8px; right: 10px; border: 0; background: transparent; font-size: 24px; line-height: 1; cursor: pointer; color: #555; }
      #qrModal img { width: 256px; height: 256px; margin-top: 12px; border: 1px solid #ddd; cursor: zoom-in; object-fit: contain; background: #fff; display: block; }
      #qrModal .qr-fullscreen {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; margin: 0; border: 0; z-index: 10001; cursor: zoom-out;
      }
      #qrModal code { word-break: break-word; font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="lang-row">
      <label for="langSelect" data-i18n="common.language">Language</label>
      <select id="langSelect"></select>
    </div>
    <div class="row" style="align-items: center;">
      <h1 data-i18n="admin.header" style="margin: 0;">Admin</h1>
      <a id="sessionsLink" href="/admin" class="muted" data-i18n="admin.allSessions">All sessions</a>
      <span id="sessionIdLabel" class="muted"></span>
      <button id="showQrBtn" type="button" data-i18n="admin.showQrCode">Team join QR</button>
    </div>

    <div class="row">
      <form id="uploadForm">
        <input type="file" id="quizFile" name="quizFile" accept=".xls,.xlsx,.csv" required />
        <button type="submit" data-i18n="admin.uploadButton">Upload .xls/.xlsx/.csv</button>
      </form>
      <button id="startBtn" data-i18n="admin.startQuiz">Start Quiz</button>
      <button id="prevBtn" data-i18n="admin.prevQuestion">Prev Question</button>
      <button id="nextBtn" data-i18n="admin.nextQuestion">Next Question</button>
      <button id="finishBtn" data-i18n="admin.finishQuiz">Finish Quiz</button>
      <button id="clearBtn" type="button" data-i18n="admin.clearQuiz">Clear Quiz</button>
    </div>
    <div class="row">
      <input id="timerSecondsInput" type="number" min="1" step="1" value="30" />
      <button id="startTimerBtn" type="button" data-i18n="admin.startTimer">Start Timer</button>
      <span id="timerStatus" class="muted"></span>
    </div>

    <div id="status" class="muted"></div>
    <div id="allSubmittedNotice" class="notice"></div>

    <div class="section">
      <h3 data-i18n="admin.questions">Questions</h3>
      <table id="questionsTable">
        <thead>
          <tr>
            <th>#</th>
            <th data-i18n="admin.type">Type</th>
            <th data-i18n="admin.question">Question</th>
            <th data-i18n="admin.options">Options</th>
            <th data-i18n="admin.correctAnswers">Correct Answers</th>
            <th data-i18n="admin.mediaUrl">Media URL</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="section">
      <div class="row">
        <h3 data-i18n="admin.teams" style="margin:0;">Teams</h3>
        <button id="clearTeamsBtn" type="button" data-i18n="admin.clearTeams">Clear Teams</button>
      </div>
      <table id="teamsTable">
        <thead>
          <tr><th data-i18n="common.name">Name</th><th data-i18n="common.status">Status</th><th data-i18n="common.score">Score</th><th data-i18n="admin.answeredCurrent">Answered current</th><th data-i18n="admin.awayFromTab">Away from tab</th><th data-i18n="common.action">Action</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="section">
      <h3 data-i18n="admin.submissions">Submissions (Edit Answers)</h3>
      <div class="row">
        <button id="submissionsPrevBtn" type="button" data-i18n="admin.submissionsPrevQuestion">Prev Question</button>
        <button id="submissionsNextBtn" type="button" data-i18n="admin.submissionsNextQuestion">Next Question</button>
        <span id="submissionsPageLabel" class="muted"></span>
      </div>
      <table id="submissionsTable">
        <thead>
          <tr>
            <th data-i18n="common.team">Team</th>
            <th data-i18n="admin.questionShort">Q#</th>
            <th data-i18n="admin.answersSeparated">Answers (; separated)</th>
            <th data-i18n="admin.markToggle">Mark (click to toggle)</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="qrModal" class="modal" aria-hidden="true">
      <div class="modal-backdrop" id="qrModalBackdrop"></div>
      <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="qrModalTitle">
        <button type="button" class="modal-close" id="qrModalClose" aria-label="Close">&times;</button>
        <h2 id="qrModalTitle" data-i18n="qr.header" style="margin-top: 0;">Join via QR</h2>
        <p data-i18n="qr.prompt">Scan this QR code to open the Team page:</p>
        <img id="qrImage" data-i18n-title="qr.imageAlt" alt="Team page QR code" />
        <p style="margin-bottom: 0;"><span data-i18n="qr.linkLabel">Link:</span> <code id="qrLinkEl"></code></p>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/session.js"></script>
    <script src="/i18n.js"></script>
    <script src="/admin.js"></script>
  </body>
  </html>
