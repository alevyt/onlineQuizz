<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; max-width: 820px; }
      input, textarea, button { padding: 8px; font-size: 14px; }
      textarea { width: 100%; min-height: 80px; }
      .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-top: 12px; }
      .muted { color: #555; }
      img, video { max-width: 100%; margin-top: 10px; }
      #options { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
      .option-btn { border: 1px solid #bbb; background: #f7f7f7; cursor: pointer; }
      .option-btn.selected { background: #dceeff; border-color: #3b82f6; }
    </style>
  </head>
  <body>
    <h1>Team Page</h1>

    <div id="registerCard" class="card">
      <h3>Register Team</h3>
      <input id="teamName" type="text" placeholder="Team name" />
      <button id="joinBtn">Join</button>
    </div>

    <div id="quizCard" class="card" style="display:none;">
      <div id="header" class="muted"></div>
      <h3 id="questionTitle">Waiting for quiz start...</h3>
      <div id="media"></div>
      <div id="options"></div>
      <textarea id="answerInput" placeholder="Type answer(s). Use ';' for multiple answers."></textarea>
      <button id="submitBtn">Submit Answer</button>
      <p id="msg" class="muted"></p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/team.js"></script>
  </body>
  </html>
