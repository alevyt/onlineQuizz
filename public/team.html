<!doctype html>
<html lang="en" translate="no" class="notranslate">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Team</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; max-width: 820px; }
      input, textarea, button { padding: 8px; font-size: 14px; }
      textarea { width: 100%; min-height: 80px; }
      .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-top: 12px; }
      .muted { color: #555; }
      img, video { max-width: 100%; margin-top: 10px; }
      #options { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
      .option-btn { border: 1px solid #bbb; background: #f7f7f7; cursor: pointer; }
      .option-btn.selected { background: #dceeff; border-color: #3b82f6; }
      .lang-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    </style>
  </head>
  <body>
    <div class="lang-row">
      <label for="langSelect" data-i18n="common.language">Language</label>
      <select id="langSelect"></select>
    </div>
    <h1 data-i18n="team.header">Team Page</h1>

    <div id="registerCard" class="card">
      <h3 data-i18n="team.registerHeader">Register Team</h3>
      <input id="teamName" type="text" data-i18n-placeholder="team.teamNamePlaceholder" placeholder="Team name" />
      <div style="margin-top: 8px; margin-bottom: 8px;">
        <label>
          <input id="resetPreviousTeamCheckbox" type="checkbox" />
          <span data-i18n="team.resetPreviousRecord">Reset previous record for this team name</span>
        </label>
      </div>
      <button id="joinBtn" data-i18n="team.join">Join</button>
    </div>

    <div id="quizCard" class="card" style="display:none;">
      <div id="header" class="muted"></div>
      <h3 id="questionTitle" data-i18n="team.waitingStart">Waiting for quiz start...</h3>
      <div id="media"></div>
      <div id="options"></div>
      <textarea id="answerInput" data-i18n-placeholder="team.answerPlaceholder" placeholder="Type answer(s). Use ';' for multiple answers."></textarea>
      <button id="submitBtn" data-i18n="team.submitAnswer">Submit Answer</button>
      <button id="skipBtn" type="button" data-i18n="team.skipQuestion">Skip Question</button>
      <p id="msg" class="muted"></p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/i18n.js"></script>
    <script src="/team.js"></script>
  </body>
  </html>
