<!doctype html>
<html lang="en" translate="no" class="notranslate">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Join QR</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; max-width: 640px; }
      .card { border: 1px solid #ddd; border-radius: 10px; padding: 16px; }
      img { width: 256px; height: 256px; margin-top: 12px; border: 1px solid #ddd; cursor: zoom-in; object-fit: contain; background: white; }
      .qr-fullscreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        margin: 0;
        border: 0;
        z-index: 9999;
        cursor: zoom-out;
      }
      code { word-break: break-word; }
      .lang-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    </style>
  </head>
  <body>
    <div class="lang-row">
      <label for="langSelect" data-i18n="common.language">Language</label>
      <select id="langSelect"></select>
    </div>
    <h1 data-i18n="qr.header">Join via QR</h1>
    <div class="card">
      <div data-i18n="qr.prompt">Scan this QR code to open the Team page:</div>
      <img id="qrImage" data-i18n-title="qr.imageAlt" alt="Team page QR code" />
      <p><span data-i18n="qr.linkLabel">Link:</span> <code id="linkEl"></code></p>
    </div>

    <script src="/i18n.js"></script>
    <script src="/qr.js"></script>
  </body>
</html>
