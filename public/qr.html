<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join QR</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; max-width: 640px; }
      .card { border: 1px solid #ddd; border-radius: 10px; padding: 16px; }
      img { width: 256px; height: 256px; margin-top: 12px; border: 1px solid #ddd; cursor: zoom-in; object-fit: contain; background: white; }
      .qr-fullscreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        margin: 0;
        border: 0;
        z-index: 9999;
        cursor: zoom-out;
      }
      code { word-break: break-word; }
    </style>
  </head>
  <body>
    <h1>Join via QR</h1>
    <div class="card">
      <div>Scan this QR code to open the Team page:</div>
      <img id="qrImage" alt="Team page QR code" />
      <p>Link: <code id="linkEl"></code></p>
    </div>

    <script src="/qr.js"></script>
  </body>
</html>
