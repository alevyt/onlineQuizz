<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join QR</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; max-width: 640px; }
      .card { border: 1px solid #ddd; border-radius: 10px; padding: 16px; }
      canvas { width: 256px; height: 256px; margin-top: 12px; }
      code { word-break: break-word; }
    </style>
  </head>
  <body>
    <h1>Join via QR</h1>
    <div class="card">
      <div>Scan this QR code to open the Team page:</div>
      <canvas id="qrCanvas" width="256" height="256"></canvas>
      <p>Link: <code id="linkEl"></code></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="/qr.js"></script>
  </body>
</html>
